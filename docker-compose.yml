services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_incident_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incident_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ai_incident_api
    ports:
      - "8000:8000"
    # Load secrets and config from .env (OPENAI_API_KEY, model names, etc.)
    env_file:
      - .env
    environment:
      # Override DATABASE_URL for container networking: inside Docker, the db
      # service is reachable by its service name on the default port (5432),
      # not via the host-side mapping (localhost:5433).
      DATABASE_URL: postgresql://postgres:postgres@db:5432/incident_db
    depends_on:
      db:
        condition: service_healthy
    # Run migrations then start the server.
    # depends_on with service_healthy guarantees the DB is accepting connections
    # before this command runs, so alembic upgrade head will succeed immediately.
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info"

volumes:
  pgdata:
